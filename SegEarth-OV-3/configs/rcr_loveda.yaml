use_rcr: true
bg_idx: null
prob_threshold: null
exclude_classes: ["background", "background class"]

tta:
  enabled: true
  views: ["hflip", "rot90", "rot180", "rot270"]
  fuse_weight: 0.72
  use_consensus_as_base: true

boundary:
  enabled: true
  kernel_size: 3
  max_margin: 0.14
  min_consensus_gain: -0.05
  label_boost: 0.18
  high_confidence_lock: 0.92
  lock_margin: 0.24
  allow_background_relabel: false
  max_changed_ratio: 0.12

component:
  enabled: true
  min_area: 72
  min_area_ratio: 0.00006
  protect_confidence: 0.76
  neighbor_kernel_size: 5
  label_boost: 0.14
  allow_background_relabel: true

dense_head:
  enabled: true
  consensus_weight: 0.08
  disagreement_weight: 0.03
  max_margin: 0.15

local_vote:
  enabled: true
  kernel_size: 5
  min_vote_ratio: 0.52
  max_margin: 0.18
  consensus_agree_required: false
  min_consensus_support: -0.06
  label_boost: 0.18
  allow_background_relabel: false
  max_changed_ratio: 0.12

safety:
  max_total_changed_ratio: 0.14

output:
  save_json: false
  keep_logits: true
  save_masks: false
