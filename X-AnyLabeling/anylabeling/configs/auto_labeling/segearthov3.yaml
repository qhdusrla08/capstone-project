# ─────────────────────────────────────────────────────────────────────────────
# 아래 두 섹션(Category-Adaptive Dual-Head Fusion / Multi-scale Adapter)은
# use_rcr=true 일 때 RCR 내부 evidence extractor 가 자체 fusion 을 수행하므로
# 실제로 호출되지 않는다. RCR 단독 실행을 위해 모두 비활성 기본값으로 고정한다.
# ─────────────────────────────────────────────────────────────────────────────

# --- Category-Adaptive Dual-Head Fusion 설정 (INACTIVE under use_rcr=true) ---
fusion_mode: "max"          # baseline max fusion; heuristic/entropy 사용 시 use_rcr=false 로 변경
things_alpha: 0.8
stuff_alpha: 0.2
things_categories: []       # things 카테고리 지정 비활성화

# --- Multi-scale Adapter (Novelty 1) 설정 (INACTIVE under use_rcr=true) ---
adapter_mode: "off"         # RSAdapter / FPN hook 모두 비활성화
adapter_bottleneck: 64
adapter_path: ""

# ─────────────────────────────────────────────────────────────────────────────
# --- RCR-SegEarth (Region-Consistency Refinement) 설정 ---
# use_rcr=true 일 때만 RCRInferencer 경로가 사용된다.
# ─────────────────────────────────────────────────────────────────────────────
use_rcr: true

# rcr_config_path: RCR YAML 설정 파일 (절대 경로 권장)
#                  비워두면 RCR 기본 설정(rcr/config.py 의 dataclass 디폴트) 사용
rcr_config_path: /home/yeon030108/capstone-project-rcr-segearth/SegEarth-OV-3/configs/rcr_vaihingen.yaml

# rcr_output_dir: RCR 디버그 아티팩트 저장 경로 (비우면 저장 안 함)
rcr_output_dir: ""

# rcr_save_json: per-image RCR 디버그 JSON 저장 여부
rcr_save_json: false
