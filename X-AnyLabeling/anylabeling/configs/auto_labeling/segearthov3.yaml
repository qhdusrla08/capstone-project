type: segearthov3
name: segearthov3-sam3
display_name: "SegEarth-OV-3 (SAM3)"
model_path: /home/yeon030108/capstone/SegEarth-OV-3/weights/sam3/sam3.pt
segearthov3_path: /home/yeon030108/capstone/SegEarth-OV-3
classes:
  - background
  - "bareland,barren"
  - grass
  - road
  - "tree,forest"
  - "water,river"
  - cropland
  - "building,roof,house"
# - "car, vehicle, truck"
  - parking lot

prob_thd: 0.1
confidence_threshold: 0.1
slide_stride: 512
slide_crop: 512
bg_idx: 0
epsilon_factor: 0.001

# --- Category-Adaptive Dual-Head Fusion 설정 ---
fusion_mode: "heuristic"   # "max" | "heuristic" | "entropy"
things_alpha: 0.8          # things 카테고리: instance head 가중치
stuff_alpha: 0.2           # stuff 카테고리: semantic head 가중치
things_categories:
  - building
 # - car
 # - car
 # - ship
 # - airplane
 # - vehicle

# --- Multi-scale Adapter (Novelty 1) 설정 ---
# adapter_mode:       "off"  → 어댑터 비활성화 (기본값, 기존 동작 유지)
#                     "hook" → Forward Hook 기반 추론 전용 모드 (가중치 무작위 초기화, scale=0)
#                     "full" → 학습된 어댑터 가중치 로드 모드
adapter_mode: "off"

# adapter_bottleneck: RSAdapter 병목 차원 (기본 64 → 학습 파라미터 ~4.2M)
adapter_bottleneck: 64

# adapter_path: 학습된 어댑터+FPN 가중치 파일 경로 (full 모드에서만 사용)
# adapter_path: /home/yeon030108/capstone/SegEarth-OV-3/rs_adapter/adapter_ckpt.pt
adapter_path: ""
